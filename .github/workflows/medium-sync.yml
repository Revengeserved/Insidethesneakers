name: Sync Medium Posts

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Medium Feed
        run: |
          curl -s https://inthesneakers.medium.com/feed > feed.xml

      - name: Convert to JSON
        run: |
          echo "[]" > posts.json
          grep -o '<item>.*</item>' feed.xml | head -5 | while read item; do
            title=$(echo $item | sed -n 's:.*<title>\(.*\)</title>.*:\1:p')
            link=$(echo $item | sed -n 's:.*<link>\(.*\)</link>.*:\1:p')
            desc=$(echo $item | sed -n 's:.*<description><![CDATA[\(.*\)]]></description>.*:\1:p')
            date=$(echo $item | sed -n 's:.*<pubDate>\(.*\)</pubDate>.*:\1:p')

            jq --arg t "$title" --arg l "$link" --arg d "$desc" --arg p "$date" \
            '. += [{title:$t,link:$l,description:$d,pubDate:$p}]' posts.json > tmp.json && mv tmp.json posts.json
          done

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add posts.json
          git commit -m "Update Medium posts" || echo "No changes"
          git push
