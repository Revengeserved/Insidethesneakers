name: Update Google Analytics Report

on:
  workflow_dispatch:
  schedule:
    - cron: '17 10 * * *'

permissions:
  contents: write

jobs:
  update-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Pull Google Analytics data
        env:
          GA_PROPERTY_ID: '392399720'
          GA_SERVICE_ACCOUNT_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
        run: npm run analytics:update

      - name: Commit updated analytics files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Google Analytics report
          file_pattern: analytics-report.json analytics-summary.md
